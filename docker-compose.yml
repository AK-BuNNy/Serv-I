version: '3.9'

services:
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build: ./apps/api-server
    restart: unless-stopped
    ports:
      - "${API_PORT:-5550}:3000"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  watcher-agent:
    build: ./apps/watcher-agent
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  ai-worker:
    build: ./apps/ai-worker
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    build: ./apps/dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-5551}:3000"
    env_file:
      - .env
    depends_on:
      - api-server